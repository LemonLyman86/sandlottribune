<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rumbl'ing — Rumblr</title>
  <link rel="icon" href="../assets/images/rumblr-logo.png">
  <link rel="stylesheet" href="../assets/css/rumblr.css">
  <!-- Open Graph / link preview -->
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="Rumblr — TSDL">
  <meta property="og:title" content="Rumbl'ing — Rumblr">
  <meta property="og:description" content="The social hub of The Sandlot Dynasty League">
  <meta property="og:image" content="https://lemonlyman86.github.io/sandlottribune/assets/images/rumblr-logo.png">
  <meta property="og:url" content="">
  <meta name="twitter:card" content="summary_large_image">
</head>
<body class="rumblr-page">

<header class="rb-header">
  <nav class="rb-nav-inner">
    <a class="rb-header-logo" href="index.html">
      <img src="../assets/images/rumblr-logo.png" alt="Rumblr">
      <span class="rb-header-logo-text">Rumb<span>lr</span></span>
    </a>
    <ul class="rb-nav-links">
      <li><a href="../">Home</a></li>
      <li><a href="../between-the-chalk/">Between The Chalk</a></li>
      <li><a href="../season-deadlines/">Season Deadlines</a></li>
      <li><a href="../league-records/">League Records</a></li>
      <li><a href="index.html" class="active"><img class="rb-nav-rumblr-logo" src="../assets/images/rumblr-logo.png" alt="Rumblr"></a></li>
      <li><a href="../about/"><img class="rb-nav-estn" src="../assets/images/estn-logo.png" alt="ESTN"></a></li>
    </ul>
    <div class="rb-header-actions">
      <a href="index.html" class="rb-btn rb-btn-ghost rb-btn-sm">&larr; Feed</a>
    </div>
  </nav>
</header>

<div class="rb-post-page">

  <!-- The main post -->
  <div id="rb-spinner" class="rb-spinner"></div>
  <div id="rb-main-post"></div>

  <!-- Reply composer (shown if logged in) -->
  <div id="rb-reply-compose" style="display:none; padding:16px 20px;
       border-bottom:1px solid var(--rb-border);">
    <div style="display:flex;gap:12px;align-items:flex-start;">
      <div id="rb-reply-avatar" class="rb-compose-avatar" style="background:#555">?</div>
      <div style="flex:1;">
        <textarea id="rb-reply-input" class="rb-compose-input"
          placeholder="Post your reply…" rows="3" maxlength="300"
          style="border-bottom:1px solid var(--rb-border);padding-bottom:8px;"></textarea>
        <div class="rb-compose-footer">
          <span id="rb-reply-counter" class="rb-char-counter">280</span>
          <button id="rb-reply-submit" class="rb-btn rb-btn-primary" disabled>Reply</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Replies -->
  <div class="rb-replies-label">Replies</div>
  <div id="rb-replies-feed"></div>

  <!-- Login prompt if not signed in -->
  <div id="rb-reply-login-prompt" class="rb-login-prompt" style="display:none;">
    <p>Sign in to leave a reply.</p>
    <div style="display:flex;gap:10px;justify-content:center;">
      <a href="login.html" class="rb-btn rb-btn-primary">Sign In</a>
      <a href="signup.html" class="rb-btn rb-btn-outline">Join Rumblr</a>
    </div>
  </div>

</div><!-- /.rb-post-page -->

<div class="rb-toast-container"></div>

<script type="module">
  import { firestore, auth } from '../assets/js/firebase-config.js';
  import {
    doc, getDoc, collection, addDoc, query,
    where, orderBy, getDocs, updateDoc, increment, serverTimestamp
  } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import {
    renderPost, showToast, notifyFollowers,
    setCurrentUser, initMentionAutocomplete
  } from '../assets/js/rumblr-app.js';
  import { initInteractions } from '../assets/js/rumblr-interactions.js';

  const postId    = new URLSearchParams(location.search).get('id');
  const openReply = new URLSearchParams(location.search).get('reply') === '1';
  let currentUser = null, currentUserDoc = null;
  let cachedPostData = null; // stored after first fetch so auth callback can re-render

  // ── Load post IMMEDIATELY — no auth needed to read public posts.
  // This ensures OG meta tags are set as quickly as possible for link
  // preview crawlers (Discord, Slack) that execute JS but have a short timeout.
  loadPost();

  onAuthStateChanged(auth, async user => {
    currentUser = user;
    if (user) {
      const snap = await getDoc(doc(firestore, 'users', user.uid));
      currentUserDoc = snap.exists() ? snap.data() : null;

      // Inject auth into rumblr-app module so renderPost() can show edit/delete menus
      setCurrentUser(user, currentUserDoc);

      document.getElementById('rb-reply-compose').style.display = 'block';
      document.getElementById('rb-reply-login-prompt').style.display = 'none';

      // Set compose avatar (show profile picture if available)
      const av = document.getElementById('rb-reply-avatar');
      if (av && currentUserDoc) {
        if (currentUserDoc.avatar_url) {
          av.innerHTML = `<img src="${currentUserDoc.avatar_url}" alt="Avatar"
            style="width:100%;height:100%;object-fit:cover;border-radius:50%;"
            onerror="this.style.display='none';">`;
          av.style.background = 'transparent';
        } else {
          av.style.background = currentUserDoc.team_color || '#555';
          av.textContent = currentUserDoc.team_abbrev || '?';
        }
      }

      // Wire up @ mention autocomplete on the reply textarea
      const replyInput = document.getElementById('rb-reply-input');
      if (replyInput) initMentionAutocomplete(replyInput);

      if (openReply) document.getElementById('rb-reply-input')?.focus();

      // If the post was already rendered before auth resolved, re-render it
      // so the edit/delete more-menu appears for the post owner.
      if (cachedPostData && cachedPostData.author_uid === user.uid) {
        const mainPost = document.getElementById('rb-main-post');
        if (mainPost && mainPost.children.length) {
          mainPost.innerHTML = '';
          const postEl = renderPost(postId, cachedPostData);
          postEl.style.cursor = 'default';
          mainPost.appendChild(postEl);
        }
      }
    } else {
      setCurrentUser(null, null);
      document.getElementById('rb-reply-compose').style.display = 'none';
      document.getElementById('rb-reply-login-prompt').style.display = 'block';
    }
  });

  async function loadPost() {
    if (!postId) return;
    const spinner = document.getElementById('rb-spinner');
    try {
      const snap = await getDoc(doc(firestore, 'posts', postId));
      spinner.style.display = 'none';
      if (!snap.exists()) {
        document.getElementById('rb-main-post').innerHTML =
          '<div class="rb-empty"><div class="rb-empty-icon">🕳</div>' +
          '<div class="rb-empty-msg">Rumbl\'ing not found.</div></div>';
        return;
      }
      const data = snap.data();
      cachedPostData = data;
      _createOgPage(postId, data).catch(() => {});
      document.title = `${data.author_name} on Rumblr`;

      // ── Update OG meta tags as soon as post data is available ──
      // og_image_url = pre-generated post card (set at creation time)
      // image_url    = user-attached photo (set at creation time)
      // fallback     = Rumblr logo
      const fallbackImg = 'https://lemonlyman86.github.io/sandlottribune/assets/images/rumblr-logo.png';
      const ogImage = data.og_image_url || data.image_url || fallbackImg;
      const setMeta = (prop, val) => {
        const el = document.querySelector(`meta[property="${prop}"]`);
        if (el && val) el.setAttribute('content', val);
      };
      setMeta('og:title',       `${data.author_name} on Rumblr`);
      setMeta('og:description', (data.content || '').slice(0, 160));
      setMeta('og:image',       ogImage);
      setMeta('og:url',         window.location.href);
      if (!data.og_image_url && !data.image_url) {
        const tc = document.querySelector('meta[name="twitter:card"]');
        if (tc) tc.setAttribute('content', 'summary');
      }

      const postEl = renderPost(postId, data);
      postEl.style.cursor = 'default';
      document.getElementById('rb-main-post').appendChild(postEl);

      loadReplies();
    } catch (err) {
      spinner.style.display = 'none';
      console.error(err);
    }
  }

  async function loadReplies() {
    const feed = document.getElementById('rb-replies-feed');
    feed.innerHTML = '';
    try {
      // No orderBy here — avoids composite index requirement; sort client-side
      const snap = await getDocs(query(
        collection(firestore, 'posts'),
        where('parent_post_id', '==', postId)
      ));
      if (snap.empty) {
        feed.innerHTML = '<div class="rb-empty" style="padding:30px 20px;">' +
          '<div class="rb-empty-sub">No replies yet. Be the first.</div></div>';
        return;
      }
      // Sort by timestamp ascending client-side
      const replies = snap.docs
        .map(d => ({ id: d.id, data: d.data() }))
        .sort((a, b) => {
          const ta = a.data.timestamp?.toMillis?.() ?? 0;
          const tb = b.data.timestamp?.toMillis?.() ?? 0;
          return ta - tb;
        });
      replies.forEach(({ id, data }) => {
        const el = renderPost(id, data, true);
        el.style.cursor = 'default';
        feed.appendChild(el);
      });
    } catch (err) {
      console.error('loadReplies error:', err);
      feed.innerHTML = '<div class="rb-empty" style="padding:30px 20px;">' +
        '<div class="rb-empty-sub">Could not load replies.</div></div>';
    }
  }

  // Reply submit
  const MAX_CHARS   = 280;
  const replyInput  = document.getElementById('rb-reply-input');
  const replyCounter = document.getElementById('rb-reply-counter');
  const replyBtn    = document.getElementById('rb-reply-submit');

  replyInput?.addEventListener('input', () => {
    const rem = MAX_CHARS - replyInput.value.length;
    replyCounter.textContent = rem;
    replyCounter.className = 'rb-char-counter' + (rem < 20 ? ' warning' : '') + (rem < 0 ? ' danger' : '');
    replyBtn.disabled = !replyInput.value.trim() || rem < 0;
  });

  replyBtn?.addEventListener('click', async () => {
    if (!currentUser || !currentUserDoc) return;
    const content = replyInput.value.trim();
    if (!content) return;
    const hashtags = [
      ...[...content.matchAll(/#(\w+)/g)].map(m => '#' + m[1]),
    ];
    const mentions = [...content.matchAll(/@(\w+)/g)].map(m => '@' + m[1]);

    replyBtn.disabled = true;
    try {
      const replyRef = await addDoc(collection(firestore, 'posts'), {
        content,
        author_type:         'user',
        author_name:         currentUserDoc.display_name,
        author_handle:       currentUserDoc.handle,
        author_uid:          currentUser.uid,
        author_team_id:      currentUserDoc.team_id,
        author_verified:     currentUserDoc.verified || false,
        author_image:        currentUserDoc.avatar_url || null,
        author_avatar_color: currentUserDoc.team_color,
        author_initials:     currentUserDoc.team_abbrev,
        hashtags,
        mentions,
        timestamp:           serverTimestamp(),
        like_count:          0, reply_count: 0, repost_count: 0,
        parent_post_id:      postId,
        is_ai_generated:     false,
      });
      await updateDoc(doc(firestore, 'posts', postId), { reply_count: increment(1) });

      notifyFollowers(currentUserDoc.handle, currentUserDoc.display_name, replyRef.id, content, 'new_reply');

      replyInput.value = '';
      replyCounter.textContent = MAX_CHARS;
      showToast('Reply posted!');
      loadReplies();
    } catch (err) {
      console.error(err);
      showToast('Could not post reply. Try again.');
    } finally {
      replyBtn.disabled = false;
    }
  });

  // ── Static OG page generator: writes rumblr/p/{postId}.html to GitHub ──────
  // Enables Discord/social previews with post-specific image + full text.
  // Requires Firestore doc config/github = { pat, owner, repo }
  async function _createOgPage(postId, data) {
    try {
      const ghSnap = await getDoc(doc(firestore, 'config', 'github'));
      if (!ghSnap.exists()) return;
      const { pat, owner, repo } = ghSnap.data();
      if (!pat || !owner || !repo) return;

      const base     = `https://${owner}.github.io/${repo}`;
      const ogImage  = data.image_url || data.author_image
                    || `${base}/assets/images/rumblr-logo.png`;
      const ogTitle  = `${data.author_name} on Rumblr`;
      const filePath = `rumblr/p/${postId}.html`;
      const pageUrl  = `${base}/${filePath}`;
      const esc = s => String(s || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');

      const html = [
        '<!DOCTYPE html>',
        '<html lang="en">',
        '<head>',
        '  <meta charset="UTF-8">',
        '  <meta property="og:type"        content="article">',
        '  <meta property="og:site_name"   content="Rumblr — TSDL">',
        `  <meta property="og:title"       content="${esc(ogTitle)}">`,
        `  <meta property="og:description" content="${esc(data.content || '')}">`,
        `  <meta property="og:image"       content="${esc(ogImage)}">`,
        `  <meta property="og:url"         content="${esc(pageUrl)}">`,
        '  <meta name="twitter:card"       content="summary_large_image">',
        `  <title>${esc(ogTitle)}</title>`,
        `  <meta http-equiv="refresh" content="0; url=../post.html?id=${postId}">`,
        '</head>',
        '<body>',
        `  <script>window.location.replace('../post.html?id=${postId}');<\/script>`,
        `  <p><a href="../post.html?id=${postId}">View this Ruml’ing →</a></p>`,
        '</body>',
        '</html>'
      ].join('
');

      // Base64-encode as UTF-8 (handles emoji + non-ASCII safely)
      const bytes = new TextEncoder().encode(html);
      let bin = ''; for (const b of bytes) bin += String.fromCharCode(b);
      const encoded = btoa(bin);

      // Fetch existing SHA if file already exists (required by GitHub API for updates)
      const apiBase = `https://api.github.com/repos/${owner}/${repo}/contents/${filePath}`;
      const checkRes = await fetch(apiBase, { headers: { Authorization: `token ${pat}` } });
      const body = { message: `rumblr: og page for post ${postId}`, content: encoded };
      if (checkRes.ok) { const ex = await checkRes.json(); body.sha = ex.sha; }

      await fetch(apiBase, {
        method: 'PUT',
        headers: { Authorization: `token ${pat}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
    } catch(e) {
      console.warn('[Rumblr] OG page skipped:', e.message);
    }
  }
</script>
</body>
</html>
