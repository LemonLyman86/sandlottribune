<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Rumblr</title>
  <link rel="icon" href="../assets/images/rumblr-logo.png">
  <link rel="stylesheet" href="../assets/css/rumblr.css">
</head>
<body class="rumblr-page">

<header class="rb-header">
  <a href="./" class="rb-header-logo">
    <img src="../assets/images/rumblr-logo.png" alt="Rumblr">
  </a>
  <div class="rb-header-actions">
    <a href="../" class="rb-btn rb-btn-ghost" style="font-size:0.78rem;">📰 Tribune</a>
    <a href="./" class="rb-btn rb-btn-ghost">← Feed</a>
  </div>
</header>

<div class="rb-post-page">

  <!-- Profile header -->
  <div id="rb-profile-header" class="rb-profile-header">
    <div id="rb-profile-avatar-wrap">
      <div id="rb-profile-avatar" class="rb-profile-avatar" style="background:#555">?</div>
    </div>
    <div style="flex:1;">
      <div class="rb-profile-name">
        <span id="rb-profile-name-text">Loading…</span>
        <span id="rb-profile-badge"></span>
        <!-- Edit button — only visible when viewing own profile -->
        <button id="rb-edit-profile-btn" class="rb-btn rb-btn-ghost"
                style="display:none;margin-left:10px;font-size:0.78rem;padding:4px 10px;">
          ✏️ Edit Profile
        </button>
      </div>
      <div id="rb-profile-handle" class="rb-profile-handle"></div>
      <div id="rb-profile-bio"    class="rb-profile-bio"></div>
      <div class="rb-profile-meta">
        <span id="rb-profile-team"></span>
        <span>·</span>
        <span id="rb-profile-joined"></span>
        <span>·</span>
        <span id="rb-profile-post-count"></span>
      </div>
    </div>
  </div>

  <!-- Posts label -->
  <div class="rb-replies-label">Rumbl'ings</div>

  <!-- Spinner -->
  <div id="rb-spinner" class="rb-spinner" style="display:none;"></div>

  <!-- User's posts -->
  <div id="rb-profile-feed"></div>

  <div class="rb-load-more">
    <button id="rb-load-more-btn" class="rb-load-more-btn" style="display:none;">
      Load more
    </button>
  </div>

</div>

<!-- ── Edit Profile Modal ─────────────────────────────────── -->
<div id="rb-edit-modal" class="rb-modal-overlay hidden">
  <div class="rb-modal" style="max-width:460px;width:92%;">
    <div class="rb-modal-header">
      <span class="rb-modal-title">Edit Profile</span>
      <span class="rb-modal-close" id="rb-edit-close">✕</span>
    </div>

    <div class="rb-form-group" style="margin-top:16px;">
      <label class="rb-form-label" for="rb-edit-name">Display Name</label>
      <input id="rb-edit-name" type="text" maxlength="40">
    </div>

    <div class="rb-form-group">
      <label class="rb-form-label" for="rb-edit-handle">Handle</label>
      <input id="rb-edit-handle" type="text" maxlength="25">
      <div class="rb-form-hint">Must start with @. Changing your handle resets your verification badge.</div>
    </div>

    <div class="rb-form-group">
      <label class="rb-form-label" for="rb-edit-bio">Bio <span style="color:var(--rb-subtle);font-size:0.8em;">(optional)</span></label>
      <input id="rb-edit-bio" type="text" maxlength="100">
    </div>

    <div class="rb-form-group">
      <label class="rb-form-label" for="rb-edit-avatar">Logo / Avatar URL <span style="color:var(--rb-subtle);font-size:0.8em;">(optional)</span></label>
      <input id="rb-edit-avatar" type="url" placeholder="https://example.com/logo.png">
      <div class="rb-form-hint">Leave blank to use your team color.</div>
      <div id="rb-edit-avatar-preview" style="display:none;margin-top:8px;">
        <img id="rb-edit-avatar-img" style="width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid var(--rb-border);" alt="Preview">
      </div>
    </div>

    <div id="rb-edit-error" class="rb-form-error" style="margin-bottom:10px;"></div>

    <div style="display:flex;gap:10px;margin-top:4px;">
      <button id="rb-edit-cancel" class="rb-btn rb-btn-outline" style="flex:0 0 auto;">Cancel</button>
      <button id="rb-edit-save"   class="rb-btn rb-btn-primary" style="flex:1;justify-content:center;">Save Changes</button>
    </div>
  </div>
</div>

<div class="rb-toast-container"></div>

<script type="module">
  import { firestore, auth } from '../assets/js/firebase-config.js';
  import {
    doc, getDoc, collection, query,
    where, limit, getDocs, startAfter, updateDoc
  } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { renderPost, AI_WRITERS, showToast } from '../assets/js/rumblr-app.js';

  const PAGE_SIZE   = 20;
  const params      = new URLSearchParams(location.search);
  const uid         = params.get('uid');
  const handle      = params.get('handle');
  let lastDoc       = null;
  let currentUserUid = null;
  let storedUserData = null;  // saved for edit modal pre-fill

  // Track auth state to show/hide Edit button
  onAuthStateChanged(auth, user => {
    currentUserUid = user ? user.uid : null;
    const editBtn = document.getElementById('rb-edit-profile-btn');
    if (editBtn && uid && currentUserUid === uid) {
      editBtn.style.display = 'inline-flex';
    }
  });

  // ── Edit Profile Modal ─────────────────────────────────
  document.getElementById('rb-edit-profile-btn').addEventListener('click', openEditModal);
  document.getElementById('rb-edit-close').addEventListener('click', closeEditModal);
  document.getElementById('rb-edit-cancel').addEventListener('click', closeEditModal);

  document.getElementById('rb-edit-avatar').addEventListener('input', () => {
    const url = document.getElementById('rb-edit-avatar').value.trim();
    const preview = document.getElementById('rb-edit-avatar-preview');
    const img = document.getElementById('rb-edit-avatar-img');
    if (url && preview && img) {
      img.src = url;
      preview.style.display = 'block';
      img.onerror = () => { preview.style.display = 'none'; };
    } else if (preview) {
      preview.style.display = 'none';
    }
  });

  document.getElementById('rb-edit-handle').addEventListener('blur', () => {
    const h = document.getElementById('rb-edit-handle');
    if (h && h.value && !h.value.startsWith('@')) h.value = '@' + h.value;
  });

  function openEditModal() {
    if (!storedUserData) return;
    document.getElementById('rb-edit-name').value   = storedUserData.display_name || '';
    document.getElementById('rb-edit-handle').value = storedUserData.handle || '';
    document.getElementById('rb-edit-bio').value    = storedUserData.bio || '';
    document.getElementById('rb-edit-avatar').value = storedUserData.avatar_url || '';
    document.getElementById('rb-edit-error').textContent = '';
    document.getElementById('rb-edit-modal').classList.remove('hidden');
  }

  function closeEditModal() {
    document.getElementById('rb-edit-modal').classList.add('hidden');
  }

  document.getElementById('rb-edit-save').addEventListener('click', async () => {
    const name      = document.getElementById('rb-edit-name').value.trim();
    const newHandle = document.getElementById('rb-edit-handle').value.trim();
    const bio       = document.getElementById('rb-edit-bio').value.trim();
    const avatarUrl = document.getElementById('rb-edit-avatar').value.trim();
    const errEl     = document.getElementById('rb-edit-error');
    const saveBtn   = document.getElementById('rb-edit-save');

    if (!name)   { errEl.textContent = 'Display name is required.'; return; }
    if (!newHandle) { errEl.textContent = 'Handle is required.'; return; }

    saveBtn.disabled = true;
    errEl.textContent = '';

    try {
      const updates = {
        display_name: name,
        handle:       newHandle,
        bio,
      };
      if (avatarUrl) {
        updates.avatar_url = avatarUrl;
      } else {
        // Remove avatar_url if cleared (use deleteField if needed, but null is fine)
        updates.avatar_url = null;
      }

      // If handle changed, reset verified status
      if (storedUserData && newHandle !== storedUserData.handle) {
        updates.verified = false;
      }

      await updateDoc(doc(firestore, 'users', uid), updates);

      // Refresh profile display
      storedUserData = { ...storedUserData, ...updates };
      renderUserProfile(storedUserData);
      closeEditModal();
      showToast('Profile updated!');
    } catch (err) {
      console.error('Profile update error:', err);
      errEl.textContent = 'Could not save changes. Try again.';
    } finally {
      saveBtn.disabled = false;
    }
  });

  // ── Profile Loading ────────────────────────────────────
  async function loadProfile() {
    const nameEl = document.getElementById('rb-profile-name-text');

    if (!uid && !handle) {
      nameEl.textContent = 'User not found';
      return;
    }

    if (uid) {
      try {
        const snap = await getDoc(doc(firestore, 'users', uid));
        if (snap.exists()) {
          storedUserData = snap.data();
          renderUserProfile(storedUserData);
          // Show edit button if own profile (auth may resolve after loadProfile, handled by onAuthStateChanged above)
          if (currentUserUid === uid) {
            document.getElementById('rb-edit-profile-btn').style.display = 'inline-flex';
          }
          loadPosts();
          return;
        }
      } catch (err) {
        console.error('User doc fetch error:', err);
      }
    }

    const lookupHandle = handle || null;

    if (lookupHandle) {
      const writer = AI_WRITERS.find(w =>
        w.handle.toLowerCase() === decodeURIComponent(lookupHandle).toLowerCase()
      );
      if (writer) {
        renderWriterProfile(writer);
        loadPosts(true, lookupHandle, true);
        return;
      }
    }

    const searchHandle = lookupHandle || uid;
    if (searchHandle) {
      try {
        const field = lookupHandle ? 'author_handle' : 'author_uid';
        const q = query(collection(firestore, 'posts'), where(field, '==', searchHandle), limit(1));
        const postsSnap = await getDocs(q);
        if (!postsSnap.empty) {
          const postData = postsSnap.docs[0].data();
          renderProfileFromPost(postData);
          loadPosts(true, lookupHandle || uid, field === 'author_handle');
          return;
        }
      } catch (err) {
        console.error('Post fallback error:', err);
      }
    }

    nameEl.textContent = 'Profile not found';
  }

  function renderUserProfile(u) {
    document.title = `${u.display_name} — Rumblr`;
    setAvatar(u.avatar_url, u.team_color, u.team_abbrev);
    document.getElementById('rb-profile-name-text').textContent = u.display_name;
    document.getElementById('rb-profile-handle').textContent = u.handle;
    document.getElementById('rb-profile-bio').textContent = u.bio || '';
    document.getElementById('rb-profile-team').textContent = u.team_name || '';
    document.getElementById('rb-profile-post-count').textContent = `${u.post_count || 0} Rumbl'ings`;

    const badge = document.getElementById('rb-profile-badge');
    badge.innerHTML = u.verified
      ? '<span class="rb-badge-verified">⚾ Verified</span>'
      : '<span class="rb-badge-pending">💩 Unverified</span>';

    if (u.joined_at?.toDate) {
      const d = u.joined_at.toDate();
      document.getElementById('rb-profile-joined').textContent =
        'Joined ' + d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    }
  }

  function renderWriterProfile(writer) {
    document.title = `${writer.name} — Rumblr`;
    setAvatar(writer.image, writer.color, writer.initials);
    document.getElementById('rb-profile-name-text').textContent = writer.name;
    document.getElementById('rb-profile-handle').textContent = writer.handle;
    document.getElementById('rb-profile-bio').textContent = 'ESTN Writer';
    document.getElementById('rb-profile-team').textContent = 'ESTN Network';
    document.getElementById('rb-profile-joined').textContent = '';
    document.getElementById('rb-profile-post-count').textContent = '';
    document.getElementById('rb-profile-badge').innerHTML =
      '<span class="rb-badge-verified">⚾ Verified</span>';
  }

  function renderProfileFromPost(postData) {
    document.title = `${postData.author_name} — Rumblr`;
    const img = postData.author_image ||
      AI_WRITERS.find(w => w.handle === postData.author_handle)?.image || null;
    setAvatar(img, postData.author_avatar_color, postData.author_initials);
    document.getElementById('rb-profile-name-text').textContent = postData.author_name;
    document.getElementById('rb-profile-handle').textContent = postData.author_handle;
    document.getElementById('rb-profile-bio').textContent = '';
    document.getElementById('rb-profile-team').textContent = '';
    document.getElementById('rb-profile-joined').textContent = '';
    document.getElementById('rb-profile-post-count').textContent = '';
    if (postData.author_verified) {
      document.getElementById('rb-profile-badge').innerHTML =
        '<span class="rb-badge-verified">⚾ Verified</span>';
    }
  }

  function setAvatar(imageUrl, color, initials) {
    const wrap = document.getElementById('rb-profile-avatar-wrap');
    if (imageUrl) {
      wrap.innerHTML = `
        <img src="${imageUrl}" alt="Avatar"
             class="rb-profile-avatar rb-profile-avatar-img"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="rb-profile-avatar" style="background:${color||'#555'};display:none;">
          ${initials||'?'}
        </div>`;
    } else {
      wrap.innerHTML = `<div class="rb-profile-avatar" style="background:${color||'#555'}">${initials||'?'}</div>`;
    }
  }

  async function loadPosts(reset = true, identifier = null, queryByHandle = false) {
    const feed        = document.getElementById('rb-profile-feed');
    const spinner     = document.getElementById('rb-spinner');
    const loadMoreBtn = document.getElementById('rb-load-more-btn');

    spinner.style.display = 'block';
    if (reset) { feed.innerHTML = ''; lastDoc = null; }

    try {
      const field = queryByHandle ? 'author_handle' : 'author_uid';
      const value = identifier || (queryByHandle ? handle : uid);

      if (!value) { spinner.style.display = 'none'; return; }

      let q;
      if (lastDoc) {
        q = query(collection(firestore, 'posts'), where(field, '==', value),
                  startAfter(lastDoc), limit(PAGE_SIZE));
      } else {
        q = query(collection(firestore, 'posts'), where(field, '==', value), limit(PAGE_SIZE));
      }

      const snap = await getDocs(q);
      spinner.style.display = 'none';

      const sorted = [...snap.docs].sort((a, b) => {
        const ta = a.data().timestamp?.toMillis?.() || 0;
        const tb = b.data().timestamp?.toMillis?.() || 0;
        return tb - ta;
      });

      if (sorted.length === 0 && reset) {
        feed.innerHTML = '<div class="rb-empty"><div class="rb-empty-icon">🤫</div>' +
          '<div class="rb-empty-msg">No Rumbl\'ings yet.</div></div>';
        return;
      }

      sorted.forEach(d => feed.appendChild(renderPost(d.id, d.data())));
      lastDoc = snap.docs[snap.docs.length - 1];
      loadMoreBtn.style.display = snap.docs.length === PAGE_SIZE ? 'block' : 'none';
    } catch (err) {
      spinner.style.display = 'none';
      console.error('Profile posts error:', err);
      feed.innerHTML = '<div style="padding:20px;color:var(--rb-muted);font-family:\'Oswald\',sans-serif;">' +
        'Could not load posts.</div>';
    }
  }

  document.getElementById('rb-load-more-btn').addEventListener('click', () => {
    loadPosts(false, handle || uid, !!handle);
  });

  document.addEventListener('DOMContentLoaded', loadProfile);
</script>
</body>
</html>
