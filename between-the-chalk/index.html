<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Between The Chalk — ESTN</title>
  <meta name="description" content="In-depth analysis, power rankings, matchup previews, and trade breakdowns for The Sandlot Dynasty League.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    /* ── BTC-specific overrides not in main.css ── */
    .btc-coming-soon-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; color: #4A5568;
      font-family: 'Oswald', sans-serif; font-size: 0.75rem;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .btc-coming-soon-item::before {
      content: ''; display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: #2D3748; flex-shrink: 0;
    }
  </style>
</head>
<body class="btc-page-body">

  <!-- ESTN Portal Nav -->
  <header class="estn-portal-nav">
    <nav class="nav-inner">
      <a class="nav-logo" href="../index.html">
        <img src="../assets/images/estn-logo-full.png" alt="ESTN">
      </a>
      <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="../tribune/">The Sandlot Tribune</a></li>
        <li><a href="../between-the-chalk/" class="active">Between The Chalk</a></li>
        <li><a href="../rumblr/">Rumblr</a></li>
        <li><a href="../league-records/">League Records</a></li>
        <li><a href="../season-deadlines/">Season Events</a></li>
        <li><a href="../about/">About</a></li>
      </ul>
      <div id="estn-auth-widget"></div>
    </nav>
  </header>

  <!-- 2-Column Layout -->
  <div class="btc-layout">

    <!-- ── Left: Article Navigator ── -->
    <aside class="btc-left-nav">
      <div class="btc-nav-header">
        <span>BETWEEN THE CHALK</span>
      </div>

      <div class="btc-nav-filters" id="btc-filter-bar">
        <button class="btc-filter-btn active" data-filter="all">All</button>
        <button class="btc-filter-btn" data-filter="season_preview">Previews</button>
        <button class="btc-filter-btn" data-filter="power_rankings">Rankings</button>
        <button class="btc-filter-btn" data-filter="weekly_recap">Recaps</button>
        <button class="btc-filter-btn" data-filter="general_analysis">Analysis</button>
      </div>

      <!-- Article List (populated by JS) -->
      <div id="btc-article-list"></div>

      <!-- Ad Slot -->
      <div class="btc-ad-slot" id="btc-left-ad-1"></div>

      <!-- Coming Soon sections -->
      <div id="btc-coming-soon">
        <div style="padding: 12px 16px 4px; font-family:'Oswald',sans-serif; font-size:0.62rem; letter-spacing:0.1em; text-transform:uppercase; color:#4A5568;">Coming This Season</div>
        <div class="btc-coming-soon-item">Power Rankings</div>
        <div class="btc-coming-soon-item">Weekly Recaps</div>
        <div class="btc-coming-soon-item">Matchup Previews</div>
        <div class="btc-coming-soon-item">Trade Analysis</div>
      </div>
    </aside>

    <!-- ── Right: Article Reader ── -->
    <main class="btc-reader-pane">
      <div class="btc-reader-spinner" id="btc-spinner"></div>
      <iframe
        id="btc-article-frame"
        class="btc-article-frame"
        title="Article Reader"
        src=""
      ></iframe>
    </main>

  </div><!-- /.btc-layout -->

  <script type="module">
    import { firestore } from '../assets/js/firebase-config.js';
    import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    // ── Fallback article list (used if Firestore settings/btc not set) ──
    const FALLBACK_ARTICLES = [
      {
        id: 'custom-lad_2026',
        title: 'Los Angeles Dodgers Make First Moves In TSDL',
        author: 'Jason Stark',
        date: 'Mar 8, 2026',
        type: 'general_analysis',
        typeLabel: 'Ownership & Transactions',
        url: '../between-the-chalk/custom-lad_2026.html',
        thumbnail: '../assets/images/Team Logos/26 Hats/LADhat2026.jpg',
        enabled: true
      },
      {
        id: 'lad_expansion_draft_2026',
        title: 'Gone West: The Rangers Are Sold, the Dodgers Are Born, and the Entire League Just Got More Interesting',
        author: 'Peter Gammons',
        date: 'Mar 7, 2026',
        type: 'general_analysis',
        typeLabel: 'Ownership & Transactions',
        url: '../between-the-chalk/lad_expansion_draft_2026.html',
        thumbnail: '../assets/images/Team Logos/26 Hats/LADhat2026.jpg',
        enabled: true
      },
      {
        id: 'season_preview_2026_sea',
        title: '2026 TSDL Season Preview: Seattle Mariners',
        author: 'Ken Rosenthal',
        date: 'Feb 28, 2026',
        type: 'season_preview',
        typeLabel: 'Season Preview',
        url: '../season-previews/season_preview_2026_sea.html',
        thumbnail: '../assets/images/sea-preview.png',
        enabled: true
      },
      {
        id: 'season_preview_2026_atl',
        title: '2026 TSDL Season Preview: Atlanta Braves',
        author: 'Tim Kurkjian',
        date: 'Feb 28, 2026',
        type: 'season_preview',
        typeLabel: 'Season Preview',
        url: '../season-previews/season_preview_2026_atl.html',
        thumbnail: '../assets/images/atl-preview.png',
        enabled: true
      },
      {
        id: 'season_preview_2026_lva',
        title: '2026 TSDL Season Preview: Las Vegas Athletics',
        author: 'Keith Law',
        date: 'Feb 27, 2026',
        type: 'season_preview',
        typeLabel: 'Season Preview',
        url: '../season-previews/season_preview_2026_lva.html',
        thumbnail: '../assets/images/lva-preview.png',
        enabled: true
      },
      {
        id: 'season_preview_2026_stl',
        title: '2026 TSDL Season Preview: St. Louis Cardinals',
        author: 'Buster Olney',
        date: 'Feb 27, 2026',
        type: 'season_preview',
        typeLabel: 'Season Preview',
        url: '../season-previews/season_preview_2026_stl.html',
        thumbnail: '../assets/images/stl-preview.png',
        enabled: true
      },
      {
        id: 'season_preview_2026_ari',
        title: '2026 TSDL Season Preview: Arizona Diamondbacks',
        author: 'Jeff Passan',
        date: 'Feb 26, 2026',
        type: 'season_preview',
        typeLabel: 'Season Preview',
        url: '../season-previews/season_preview_2026_ari.html',
        thumbnail: '../assets/images/ari-preview.png',
        enabled: true
      }
    ];

    // ── State ──
    let allArticles = [];
    let activeFilter = 'all';

    // ── Helpers ──
    const frame   = document.getElementById('btc-article-frame');
    const spinner = document.getElementById('btc-spinner');
    const listEl  = document.getElementById('btc-article-list');

    function loadArticle(url, itemEl) {
      spinner.style.display = 'block';
      frame.src = url;
      document.querySelectorAll('.btc-nav-item').forEach(n => n.classList.remove('active'));
      if (itemEl) itemEl.classList.add('active');
      // Update URL without reload
      const params = new URLSearchParams(window.location.search);
      params.set('article', url.split('/').pop());
      history.replaceState({}, '', '?' + params.toString());
    }

    frame.addEventListener('load', () => {
      spinner.style.display = 'none';
      // Hide the article's own nav when displayed inside the BTC iframe (same-origin)
      try {
        const iDoc = frame.contentDocument || frame.contentWindow.document;
        const s = iDoc.createElement('style');
        s.textContent = '.estn-portal-nav { display: none !important; } body { padding-top: 0 !important; }';
        iDoc.head.appendChild(s);
      } catch(e) {}
    });

    // ── Render article list ──
    function renderList(articles) {
      const filtered = activeFilter === 'all'
        ? articles
        : articles.filter(a => a.type === activeFilter);

      listEl.innerHTML = '';
      if (!filtered.length) {
        listEl.innerHTML = '<div style="padding:16px;font-family:\'Oswald\',sans-serif;font-size:0.75rem;color:#4A5568;letter-spacing:0.06em;">No articles yet in this category.</div>';
        return;
      }

      filtered.forEach(article => {
        if (!article.enabled) return;
        const item = document.createElement('button');
        item.className = 'btc-nav-item';
        item.dataset.url = article.url;
        item.innerHTML = `
          <img class="btc-nav-item-thumb" src="${article.thumbnail || '../assets/images/placeholder.png'}" alt="" onerror="this.style.display='none'">
          <div class="btc-nav-item-meta">
            <span class="btc-nav-item-type">${article.typeLabel || article.type}</span>
            <span class="btc-nav-item-title">${article.title}</span>
            <span class="btc-nav-item-byline">${article.author} &middot; ${article.date}</span>
          </div>
        `;
        // Mark active if current frame matches
        if (frame.src && frame.src.includes(article.url.split('/').pop())) {
          item.classList.add('active');
        }
        item.addEventListener('click', () => loadArticle(article.url, item));
        listEl.appendChild(item);
      });
    }

    // ── Filter buttons ──
    document.querySelectorAll('.btc-filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.btc-filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        renderList(allArticles);
      });
    });

    // ── Load articles from Firestore, fall back to hardcoded ──
    async function init() {
      try {
        const snap = await getDoc(doc(firestore, 'settings', 'btc'));
        if (snap.exists() && Array.isArray(snap.data().articles) && snap.data().articles.length) {
          allArticles = snap.data().articles.filter(a => a.enabled !== false);
        } else {
          allArticles = FALLBACK_ARTICLES;
        }
      } catch {
        allArticles = FALLBACK_ARTICLES;
      }

      renderList(allArticles);

      // ── Deep-link or default ──
      const params = new URLSearchParams(window.location.search);
      const articleParam = params.get('article');
      let initialUrl = null;

      if (articleParam) {
        const match = allArticles.find(a => a.url.split('/').pop() === articleParam || a.url.includes(articleParam));
        if (match) initialUrl = match.url;
      }

      if (!initialUrl && allArticles.length > 0) {
        initialUrl = allArticles[0].url;
      }

      if (initialUrl) {
        const firstItem = listEl.querySelector(`[data-url="${initialUrl}"]`);
        loadArticle(initialUrl, firstItem);
      }
    }

    init();
  </script>

  <script type="module" src="../assets/js/estn-auth.js"></script>
  <script type="module" src="../assets/js/estn-ticker.js"></script>
</body>
</html>
